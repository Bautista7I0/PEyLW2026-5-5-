<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 9</title>
</head>
<body>
    <form>
        <div>
            <label for="nombre"><big>
                Ingrese su Nombre:
            </big></label>
        </div>
        <input type="text" name="nombre"><br/>
        <div>
            <label for="lenguajes"><big>
                Selecciones los lenguajes que conoce:
            </big></label>
            <div>
                <label><big>Java</big></label>
                <input type="checkbox" name="lenguajes" value="Java">
            </div>
            <div>
                <label><big>HTML</big></label>
                <input type="checkbox" name="lenguajes" value="HTML">
            </div>
            <div>
                <label><big>C</big></label>
                <input type="checkbox" name="lenguajes" value="C">
            </div>
            <div>
                <label><big>C++</big></label>
                <input type="checkbox" name="lenguajes" value="C++">
            </div>
        </div>

        <input type="submit" value="Enviar">
        <input type="reset" value="Borrar">
    </form>
</body>
</html>
