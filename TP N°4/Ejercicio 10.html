<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
</head>
<body>
    <form>
        <label>Ingrese sus nombre:</label><br/>
        <input type="text" name="nombre"><br/>

        <label>Ingrese su mail:</label><br/>
        <input type="text" name="mail"><br/>
        <div>
            <label>Ingrese su país de origen:</label><br/>
            <select name="pais">
                <option value="seleccione">Seleccione su país</option>
                <option value="argentina">Argentina</option>
                <option value="brasil">Brasil</option>
                <option value="chile">Chile</option>
                <option value="uruguay">Uruguay</option>
                <option value="paraguay">Paraguay</option>
                <option value="bolivia">Bolivia</option>
                <option value="peru">Perú</option>
                <option value="No se">No se</option>
            </select>
        </div>
        <br/>

        <div>
            <label>Valore el sitio web:</label><br/>
            <input type="radio" name="valoracion" value="malo"> Malo<br/>
            <input type="radio" name="valoracion" value="regular"> Regular<br/>
            <input type="radio" name="valoracion" value="bueno" checked> Bueno<br/>
            <input type="radio" name="valoracion" value="muy bueno"> Muy Bueno<br/>
        </div>
        <br/>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
